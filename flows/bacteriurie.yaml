id: bacteriurie
version: '1'
title: Urineweginfectie
description: Diagnose en behandeling van urineweginfecties.

questions:
  tissueInvasion:
    id: q_bac_tissue
    text: Is er sprake van weefselinvasie?
    type: select
    description: "[Zie NHG-Standaard Urineweginfecties](https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-begrippen)"
    options:
      - id: o_bac_ti_local
        text: Geen
        value: local
      - id: o_bac_ti_invasion
        text: Ja, tekenen van weefselinvasie
        description: "Koorts en/of algehele malaise en/of (koude) rillingen en/of flank- of perineumpijn (pyelonefritis/prostatitis) en/of een delier"
        value: tissueInvasion

  riskAssessment:
    id: q_bac_risk
    text: Behoort patiënt tot een risicogroep?
    type: select
    description: "[Zie definities en begrippen.](https://www.verenso.nl/kwaliteit/richtlijnen-en-praktijkvoering/richtlijnendatabase/urineweginfecties-1)"
    options:
      - id: o_bac_risk_healthy
        text: Nee
        value: healthy
      - id: o_bac_risk_dm
        text: Diabetes mellitus of een verminderde weerstand
        value: vulnerable
      - id: o_bac_risk_renal
        text: Afwijkingen aan nieren of urinewegen
        description: "Ernstige nierfunctiestoornissen (eGFR < 30 ml/min/1,73 m²), cystenieren, nierstenen, neurogene blaas, bemoeilijkte mictie of bekend blaasresidu"
        value: vulnerable
      - id: o_bac_risk_neuro
        text: Patiënten met neurologische blaasfunctiestoornissen
        value: vulnerable
      - id: o_bac_risk_elderly
        text: Kwetsbare ouderen
        value: elderly
      - id: o_bac_risk_pregnant
        text: Zwangeren
        value: pregnant
      - id: o_bac_risk_men
        text: Mannen
        value: men
      - id: o_bac_risk_children
        text: Kinderen
        value: children

  elderly:
    id: q_bac_elderly
    text: Is er sprake van urineweggerelateerde klachten?
    type: select
    description: "Één zeer hinderlijk danwel twee of meer urineweggerelateerde symptomen: dysurie (pijn bij het plassen), (loze) mictiedrang, frequente mictie, urine-incontinentie, (zichtbare) urethrale pusafscheiding"
    conditions:
      - if: "riskAssessment == elderly"
    options:
      - id: o_bac_eld_two
        text: Twee of meer van urineweggerelateerde symptomen
        value: symptomatic
      - id: o_bac_eld_one
        text: Één zeer hinderlijk urineweggerelateerd symptoom waarvoor geen andere verklaring kan worden gevonden
        value: symptomatic
      - id: o_bac_eld_none
        text: Andere symptomen
        value: asymptomatic

  sex:
    id: q_bac_sex
    text: Gaat het om een man of een vrouw?
    type: select
    conditions:
      - if: "tissueInvasion == local"
      - if: "riskAssessment == elderly"
      - if: "elderly == symptomatic"
    options:
      - id: o_bac_sex_male
        text: Man
        value: male
      - id: o_bac_sex_female
        text: Vrouw
        value: female

  sexTissueInvasion:
    id: q_bac_sex_ti
    text: Gaat het om een man of een vrouw?
    type: select
    conditions:
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == elderly"
    options:
      - id: o_bac_sex_ti_male
        text: Man
        value: male
      - id: o_bac_sex_ti_female
        text: Vrouw
        value: female

  urinaryCatheter:
    id: q_bac_catheter
    text: Heeft patiënt een urine katheter?
    type: select
    conditions:
      - if: "riskAssessment != elderly"
      - if: "riskAssessment != pregnant"
    options:
      - id: o_bac_cath_yes
        text: Ja
        value: "yes"
      - id: o_bac_cath_no
        text: Nee
        value: "no"

  # Treatment selection questions — one per namespace with multiple options

  treatmentLocalHealthy:
    id: q_bac_tx_local_healthy
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "tissueInvasion == local"
      - if: "riskAssessment == healthy"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_lh_0
        text: Afwachtend beleid (eventueel met pijnstilling)
        value: "0"
      - id: o_tx_lh_1
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_lh_2
        text: Fosfomycine (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "2"
      - id: o_tx_lh_3
        text: Trimethoprim (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "3"

  treatmentLocalVulnerable:
    id: q_bac_tx_local_vulnerable
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == local"
      - if: "riskAssessment == vulnerable"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_lv_0
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_lv_1
        text: Fosfomycine (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_lv_2
        text: Trimethoprim (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentLocalPregnant:
    id: q_bac_tx_local_pregnant
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == local"
      - if: "riskAssessment == pregnant"
    options:
      - id: o_tx_lp_0
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_lp_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"

  treatmentLocalMen:
    id: q_bac_tx_local_men
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == local"
      - if: "riskAssessment == men"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_lm_0
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_lm_1
        text: Trimethoprim (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"

  treatmentLocalChildren:
    id: q_bac_tx_local_children
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == local"
      - if: "riskAssessment == children"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_lc_0
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_lc_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"

  treatmentLocalElderlyVulnerable:
    id: q_bac_tx_local_elderly_vuln
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == local"
      - if: "riskAssessment == elderly"
      - if: "elderly == symptomatic"
      - if: "sex == female"
    options:
      - id: o_tx_lev_0
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën. NHG: 7 dagen, Verenso (kwetsbare ouderen): 5 dagen"
        value: "0"
      - id: o_tx_lev_1
        text: Fosfomycine (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_lev_2
        text: Trimethoprim (3e keuze)
        description: "3e keuze — controleer eerst op allergieën. Niet in Verenso-richtlijn kwetsbare ouderen"
        value: "2"

  treatmentLocalElderlyMen:
    id: q_bac_tx_local_elderly_men
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == local"
      - if: "riskAssessment == elderly"
      - if: "elderly == symptomatic"
      - if: "sex == male"
    options:
      - id: o_tx_lem_0
        text: Nitrofurantoïne (1e keuze)
        description: "1e keuze — controleer eerst op allergieën. NHG: 7 dagen, Verenso (kwetsbare ouderen): 5 dagen"
        value: "0"
      - id: o_tx_lem_1
        text: Trimethoprim (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"

  # Tissue invasion treatment questions

  treatmentTiHealthy:
    id: q_bac_tx_ti_healthy
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == healthy"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_tih_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_tih_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_tih_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiVulnerable:
    id: q_bac_tx_ti_vulnerable
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == vulnerable"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_tiv_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_tiv_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_tiv_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiMen:
    id: q_bac_tx_ti_men
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == men"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_tim_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_tim_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_tim_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiChildren:
    id: q_bac_tx_ti_children
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == children"
      - if: "urinaryCatheter == no"
    options:
      - id: o_tx_tic_0
        text: Amoxicilline/clavulaanzuur (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_tic_1
        text: Cotrimoxazol (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"

  treatmentTiCadWoman:
    id: q_bac_tx_ti_cad_woman
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == healthy"
      - if: "urinaryCatheter == yes"
    options:
      - id: o_tx_ticw_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën. Verenso: 7 dagen bij snelle respons, 10–14 dagen bij vertraagde respons"
        value: "0"
      - id: o_tx_ticw_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_ticw_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiCadMen:
    id: q_bac_tx_ti_cad_men
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == men"
      - if: "urinaryCatheter == yes"
    options:
      - id: o_tx_ticm_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën. Verenso: 7 dagen bij snelle respons, 10–14 dagen bij vertraagde respons"
        value: "0"
      - id: o_tx_ticm_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_ticm_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiElderlyWoman:
    id: q_bac_tx_ti_elderly_woman
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == elderly"
      - if: "sexTissueInvasion == female"
    options:
      - id: o_tx_tiew_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën. NHG: 7 dagen, Verenso: 10 dagen (vrouwen)"
        value: "0"
      - id: o_tx_tiew_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_tiew_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiElderlyMen:
    id: q_bac_tx_ti_elderly_men
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == elderly"
      - if: "sexTissueInvasion == male"
    options:
      - id: o_tx_tiem_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën"
        value: "0"
      - id: o_tx_tiem_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_tiem_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

  treatmentTiVulnerableCatheter:
    id: q_bac_tx_ti_vuln_cath
    text: Welke behandeling kan patiënt krijgen?
    type: select
    conditions:
      - if: "_role != triagist"
      - if: "tissueInvasion == tissueInvasion"
      - if: "riskAssessment == vulnerable"
      - if: "urinaryCatheter == yes"
    options:
      - id: o_tx_tivc_0
        text: Ciprofloxacine (1e keuze)
        description: "1e keuze — controleer eerst op allergieën. Verenso: 7 dagen bij snelle respons, 10–14 dagen bij vertraagde respons"
        value: "0"
      - id: o_tx_tivc_1
        text: Amoxicilline/clavulaanzuur (2e keuze)
        description: "2e keuze — controleer eerst op allergieën"
        value: "1"
      - id: o_tx_tivc_2
        text: Cotrimoxazol (3e keuze)
        description: "3e keuze — controleer eerst op allergieën"
        value: "2"

steps:
  - id: s_bac_1
    title: Weefselinvasie
    questions: [tissueInvasion]
  - id: s_bac_2
    title: Risicogroep
    questions: [riskAssessment]
  - id: s_bac_3
    title: Ouderen
    questions: [elderly]
  - id: s_bac_4
    title: Geslacht
    questions: [sex, sexTissueInvasion]
  - id: s_bac_5
    title: Katheter
    questions: [urinaryCatheter]
  - id: s_bac_6
    title: Behandeling
    questions: [treatmentLocalHealthy, treatmentLocalVulnerable, treatmentLocalPregnant, treatmentLocalMen, treatmentLocalChildren, treatmentLocalElderlyVulnerable, treatmentLocalElderlyMen, treatmentTiHealthy, treatmentTiVulnerable, treatmentTiMen, treatmentTiChildren, treatmentTiCadWoman, treatmentTiCadMen, treatmentTiElderlyWoman, treatmentTiElderlyMen, treatmentTiVulnerableCatheter]

results:
  # === Triage results (triagist referral) ===

  triage.u2:
    title: "Verwijs naar spreekuur"
    description: "Verdenking weefselinvasieve urineweginfectie. Plan spoedafspraak voor beoordeling door arts of verpleegkundige."
    urgency: "U2"
    documentation: "Triagist: verdenking UWI met weefselinvasie, spoedafspraak ingepland voor beoordeling door arts of verpleegkundige."
    sources:
      - name: "NHG-TriageWijzer: Urinewegklachten"
        url: "https://richtlijnen.nhg.org/nhg-triagewijzer/urinewegklachten"

  triage.u3:
    title: "Verwijs naar spreekuur"
    description: "Verdenking urineweginfectie bij kwetsbare patiënt. Plan afspraak dezelfde dag voor beoordeling door arts of verpleegkundige."
    urgency: "U3"
    documentation: "Triagist: verdenking UWI bij kwetsbare/complexe patiënt, afspraak dezelfde dag ingepland voor beoordeling door arts of verpleegkundige."
    sources:
      - name: "NHG-TriageWijzer: Urinewegklachten"
        url: "https://richtlijnen.nhg.org/nhg-triagewijzer/urinewegklachten"

  # === Direct results (no treatment selection needed) ===

  uti.tissueInvasion.pregnant:
    title: "Pyelonefritis bij zwangere"
    description: "Verwijs naar gynaecoloog."
    documentation: "Verwezen naar gynaecoloog"
    explainer: "Een pyelonefritis in de zwangerschap gaat gepaard met een verhoogd risico op ernstige morbiditeit of mortaliteit. Het advies om zwangeren met een pyelonefritis voor behandeling te verwijzen naar de 2e lijn sluit aan bij de aanbeveling uit de richtlijn Urineweginfecties in de Zwangerschap van de NVOG."
    sources:
      - name: "NHG-Standaard Urineweginfecties: beleid"
        url: "https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-richtlijnen-beleid-bij-cystitis"
      - name: "Thuisarts: blaasontsteking en zwanger"
        url: "https://www.thuisarts.nl/blaasontsteking/ik-ben-zwanger-en-heb-blaasontsteking"

  uti.local.elderly:
    title: "Cystitis: Kwetsbare oudere zonder indicatie"
    description: "Geen antibiotica voor urineweginfectie. Overweeg andere oorzaak voor de klachten. Blijf patiënt actief monitoren. Heroverweeg als nieuwe klachten ontstaan of als bestaande klachten niet verdwijnen."
    documentation: "Actief vervolgen van de klachten. Opnieuw contact bij verergering van de klachten of bij aanhoudende klachten na 1 week (arbitrair)."
    explainer: "De diagnose UWI bij kwetsbare ouderen is klinisch, aanvullend onderzoek is vaak ten onrechte positief. Gebruik bij ouderen de nitriet test alleen op een urineweginfectie uit te sluiten. Kweek urine altijd bij patiënten met tekenen van weefselinvasie, bij mannen en bij falen van ingezette therapie en bij recidiverende infecties."
    sources:
      - name: "Verenso Richtlijn Urineweginfecties: diagnostiek en aanvullend onderzoek"
        url: "https://www.verenso.nl/kwaliteit/richtlijnen-en-praktijkvoering/richtlijnendatabase/urineweginfecties-1"
      - name: "Verenso Richtlijn Urineweginfecties: Stroomschema"
        url: "https://www.verenso.nl/kwaliteit/richtlijnen-en-praktijkvoering/richtlijnendatabase/urineweginfecties-1"

  uti.local.cadMen:
    title: "Katheter: Geen behandeling nodig"
    description: "Behandeling is niet nodig."
    documentation: "Behandeling is niet nodig in afwezigheid van tekenen van weefselinvasie (koorts, algehele malaise, (koude) rillingen, flank- of perineumpijn, een delier)"
    explainer: "Behandeling van asymptomatische bacteriurie wordt in alle patiëntgroepen, met uitzondering van zwangeren, afgeraden."
    sources:
      - name: "NHG-Standaard Urineweginfecties: beleid"
        url: "https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-richtlijnen-beleid-bij-cystitis"

  # === uti.local.healthy (4 options) ===

  uti.local.healthy.0:
    title: "Cystitis: Gezonde vrouw"
    treatment: "Afwachtend beleid (eventueel met pijnstilling)"
    testAfterTreatment: "Indien na 1 week geen verbetering urineonderzoek herhalen en bij positieve test behandelen met antibiotica"
    additionalTests: "Kweek als behandeling 2 keer gefaald heeft."
    documentation: "Afwachtend beleid (eventueel met pijnstilling) afgesproken. Indien na 1 week geen verbetering urineonderzoek herhalen en bij positieve test behandelen met antibiotica. Contact bij klachten zoals beschreven in https://www.thuisarts.nl/blaasontsteking/ik-heb-blaasontsteking-vrouw"
    explainer: "Leg uit dat een cystitis veel voorkomt, niet besmettelijk is, maar kan terugkomen. Het betreft een hinderlijke, in principe onschuldige aandoening, die spontaan binnen 1 week kan genezen (bij 55% van gezonde vrouwen). Met antibiotische behandeling zijn de klachten doorgaans eerder verdwenen. Klachten kunnen tot enkele dagen na afloop van de behandeling blijven bestaan. Antibioticagebruik kan echter leiden tot bijwerkingen en antibioticaresistentie."
    sources:
