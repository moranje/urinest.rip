logic:
  # === Triage rules (triagist referral — must be before treatment rules) ===

  # Triagist + tissue invasion → U2 urgent referral
  - when: ["_role == triagist", "tissueInvasion == tissueInvasion"]
    show: triage.u2

  # Triagist + local + vulnerable → U3 same-day referral
  - when: ["_role == triagist", "tissueInvasion == local", "riskAssessment == vulnerable"]
    show: triage.u3

  # Triagist + local + elderly → U3 same-day referral
  - when: ["_role == triagist", "tissueInvasion == local", "riskAssessment == elderly"]
    show: triage.u3

  # Triagist + local + pregnant → U3 same-day referral
  - when: ["_role == triagist", "tissueInvasion == local", "riskAssessment == pregnant"]
    show: triage.u3

  # Triagist + local + men → U3 same-day referral
  - when: ["_role == triagist", "tissueInvasion == local", "riskAssessment == men"]
    show: triage.u3

  # Triagist + local + children → U3 same-day referral
  - when: ["_role == triagist", "tissueInvasion == local", "riskAssessment == children"]
    show: triage.u3

  # Triagist + local + healthy + catheter → U3 same-day referral
  - when: ["_role == triagist", "tissueInvasion == local", "riskAssessment == healthy", "urinaryCatheter == yes"]
    show: triage.u3

  # === Direct results (no treatment selection) ===

  # Tissue invasion + pregnant → gynaecologist referral
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == pregnant"]
    show: uti.tissueInvasion.pregnant

  # Local + elderly + asymptomatic → no treatment
  - when: ["tissueInvasion == local", "riskAssessment == elderly", "elderly == asymptomatic"]
    show: uti.local.elderly

  # Local + catheter → no treatment (cadMen result used for both)
  - when: ["tissueInvasion == local", "riskAssessment == healthy", "urinaryCatheter == yes"]
    show: uti.local.cadMen
  - when: ["tissueInvasion == local", "riskAssessment == vulnerable", "urinaryCatheter == yes"]
    show: uti.local.cadMen
  - when: ["tissueInvasion == local", "riskAssessment == men", "urinaryCatheter == yes"]
    show: uti.local.cadMen
  - when: ["tissueInvasion == local", "riskAssessment == children", "urinaryCatheter == yes"]
    show: uti.local.cadMen

  # === Local treatment selections ===

  - when: ["tissueInvasion == local", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentLocalHealthy == 0"]
    show: uti.local.healthy.0
  - when: ["tissueInvasion == local", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentLocalHealthy == 1"]
    show: uti.local.healthy.1
  - when: ["tissueInvasion == local", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentLocalHealthy == 2"]
    show: uti.local.healthy.2
  - when: ["tissueInvasion == local", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentLocalHealthy == 3"]
    show: uti.local.healthy.3

  - when: ["tissueInvasion == local", "riskAssessment == vulnerable", "urinaryCatheter == no", "treatmentLocalVulnerable == 0"]
    show: uti.local.vulnerable.0
  - when: ["tissueInvasion == local", "riskAssessment == vulnerable", "urinaryCatheter == no", "treatmentLocalVulnerable == 1"]
    show: uti.local.vulnerable.1
  - when: ["tissueInvasion == local", "riskAssessment == vulnerable", "urinaryCatheter == no", "treatmentLocalVulnerable == 2"]
    show: uti.local.vulnerable.2

  - when: ["tissueInvasion == local", "riskAssessment == pregnant", "treatmentLocalPregnant == 0"]
    show: uti.local.pregnant.0
  - when: ["tissueInvasion == local", "riskAssessment == pregnant", "treatmentLocalPregnant == 1"]
    show: uti.local.pregnant.1

  - when: ["tissueInvasion == local", "riskAssessment == men", "urinaryCatheter == no", "treatmentLocalMen == 0"]
    show: uti.local.men.0
  - when: ["tissueInvasion == local", "riskAssessment == men", "urinaryCatheter == no", "treatmentLocalMen == 1"]
    show: uti.local.men.1

  - when: ["tissueInvasion == local", "riskAssessment == children", "urinaryCatheter == no", "treatmentLocalChildren == 0"]
    show: uti.local.children.0
  - when: ["tissueInvasion == local", "riskAssessment == children", "urinaryCatheter == no", "treatmentLocalChildren == 1"]
    show: uti.local.children.1

  # Local + elderly + symptomatic + female → uses vulnerable treatment
  - when: ["tissueInvasion == local", "riskAssessment == elderly", "elderly == symptomatic", "sex == female", "treatmentLocalElderlyVulnerable == 0"]
    show: uti.local.vulnerable.0
  - when: ["tissueInvasion == local", "riskAssessment == elderly", "elderly == symptomatic", "sex == female", "treatmentLocalElderlyVulnerable == 1"]
    show: uti.local.vulnerable.1
  - when: ["tissueInvasion == local", "riskAssessment == elderly", "elderly == symptomatic", "sex == female", "treatmentLocalElderlyVulnerable == 2"]
    show: uti.local.vulnerable.2

  # Local + elderly + symptomatic + male → uses men treatment
  - when: ["tissueInvasion == local", "riskAssessment == elderly", "elderly == symptomatic", "sex == male", "treatmentLocalElderlyMen == 0"]
    show: uti.local.men.0
  - when: ["tissueInvasion == local", "riskAssessment == elderly", "elderly == symptomatic", "sex == male", "treatmentLocalElderlyMen == 1"]
    show: uti.local.men.1

  # === Tissue invasion treatment selections ===

  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentTiHealthy == 0"]
    show: uti.tissueInvasion.healthy.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentTiHealthy == 1"]
    show: uti.tissueInvasion.healthy.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == healthy", "urinaryCatheter == no", "treatmentTiHealthy == 2"]
    show: uti.tissueInvasion.healthy.2

  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == vulnerable", "urinaryCatheter == no", "treatmentTiVulnerable == 0"]
    show: uti.tissueInvasion.vulnerable.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == vulnerable", "urinaryCatheter == no", "treatmentTiVulnerable == 1"]
    show: uti.tissueInvasion.vulnerable.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == vulnerable", "urinaryCatheter == no", "treatmentTiVulnerable == 2"]
    show: uti.tissueInvasion.vulnerable.2

  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == men", "urinaryCatheter == no", "treatmentTiMen == 0"]
    show: uti.tissueInvasion.men.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == men", "urinaryCatheter == no", "treatmentTiMen == 1"]
    show: uti.tissueInvasion.men.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == men", "urinaryCatheter == no", "treatmentTiMen == 2"]
    show: uti.tissueInvasion.men.2

  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == children", "urinaryCatheter == no", "treatmentTiChildren == 0"]
    show: uti.tissueInvasion.children.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == children", "urinaryCatheter == no", "treatmentTiChildren == 1"]
    show: uti.tissueInvasion.children.1

  # TI + catheter (healthy = woman with catheter)
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == healthy", "urinaryCatheter == yes", "treatmentTiCadWoman == 0"]
    show: uti.tissueInvasion.cadWoman.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == healthy", "urinaryCatheter == yes", "treatmentTiCadWoman == 1"]
    show: uti.tissueInvasion.cadWoman.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == healthy", "urinaryCatheter == yes", "treatmentTiCadWoman == 2"]
    show: uti.tissueInvasion.cadWoman.2

  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == men", "urinaryCatheter == yes", "treatmentTiCadMen == 0"]
    show: uti.tissueInvasion.cadMen.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == men", "urinaryCatheter == yes", "treatmentTiCadMen == 1"]
    show: uti.tissueInvasion.cadMen.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == men", "urinaryCatheter == yes", "treatmentTiCadMen == 2"]
    show: uti.tissueInvasion.cadMen.2

  # TI + elderly → sex question → uses vulnerable/men treatment
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == elderly", "sexTissueInvasion == female", "treatmentTiElderlyWoman == 0"]
    show: uti.tissueInvasion.vulnerable.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == elderly", "sexTissueInvasion == female", "treatmentTiElderlyWoman == 1"]
    show: uti.tissueInvasion.vulnerable.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == elderly", "sexTissueInvasion == female", "treatmentTiElderlyWoman == 2"]
    show: uti.tissueInvasion.vulnerable.2

  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == elderly", "sexTissueInvasion == male", "treatmentTiElderlyMen == 0"]
    show: uti.tissueInvasion.men.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == elderly", "sexTissueInvasion == male", "treatmentTiElderlyMen == 1"]
    show: uti.tissueInvasion.men.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == elderly", "sexTissueInvasion == male", "treatmentTiElderlyMen == 2"]
    show: uti.tissueInvasion.men.2

  # TI + vulnerable + catheter
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == vulnerable", "urinaryCatheter == yes", "treatmentTiVulnerableCatheter == 0"]
    show: uti.tissueInvasion.vulnerable.0
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == vulnerable", "urinaryCatheter == yes", "treatmentTiVulnerableCatheter == 1"]
    show: uti.tissueInvasion.vulnerable.1
  - when: ["tissueInvasion == tissueInvasion", "riskAssessment == vulnerable", "urinaryCatheter == yes", "treatmentTiVulnerableCatheter == 2"]
    show: uti.tissueInvasion.vulnerable.2
