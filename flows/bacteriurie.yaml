  uti.tissueInvasion.healthy.0:
    title: "Pyelonefritis: Gezonde vrouw"
    treatment: "Ciprofloxacine, 7 dagen, 2 dd 500 mg"
    contraindications:
      - text: "het geven van borstvoeding"
      - text: "gecombineerde lever- en nierfunctiestoornissen"
      - text: "neuropathie"
      - text: "peesaandoeningen gerelateerd aan het eerdere gebruik van fluorochinolonen"
    warnings: "Overweeg een alternatief bij patiënten met een verhoogd risico op een aorta-aneurysma of -dissectie. Bij eGFR 30–60: 500mg iedere 12 uur, bij eGFR < 30: 500 mg iedere 24 uur. Neem niet gelijktijdig in met metaalverbindingen, zoals calcium, magnesium- en ijzerpreparaten."
