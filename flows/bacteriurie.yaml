    title: "Cystitis: Kind"
    treatment: "Nitrofurantoïne, 5 dagen, 5 tot 6 mg/kg lichaamsgewicht in 4 giften, maximaal 200 mg/dag"
    contraindications:
      - text: "eGFR < 30 ml/min"
      - text: "G6PD-deficiëntie"
    additionalTests: "Urine op kweek, indien < 12 jaar"
    documentation: "Nitrofurantoïne, 5 dagen, 5 tot 6 mg/kg lichaamsgewicht in 4 giften, maximaal 200 mg/dag. Indien urine op kweek, graag contact over uitslag. Contact bij klachten zoals beschreven in https://www.thuisarts.nl/blaasontsteking/mijn-kind-heeft-blaasontsteking. Indien binnen 48 uur geen verbetering overweeg verwijzing naar kinderarts."
    explainer: "Leg uit dat een urineweginfectie ernstig kan verlopen en een antibioticum noodzakelijk is. Adviseer ruime vochtinname. Laat de patiënt bij verergering van de klachten (koorts, algemeen ziek-zijn) direct contact opnemen met de (dienstdoende) huisarts. Geef ouders van kinderen met een urineweginfectie die zindelijk zijn of > 5 jaar uitleg over de werking van de bekkenbodem en vertel dat ontspanning nodig is voor volledige lediging van blaas en darmen."
