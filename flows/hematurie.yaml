id: hematurie
version: '1'
title: Hematurie
description: Beoordeling van hematurie op basis van urineonderzoek.

questions:
  hematuriaType:
    id: q_hematuria_type
    text: Wat is de bevinding?
    type: select
    description: "[Zie NHG-Standaard Urineweginfecties](https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-aanvullend-onderzoek)"
    options:
      - id: o_visible
        text: Zichtbare hematurie
        value: visible
      - id: o_proteinuria
        text: Proteinurie
        value: proteinuria
      - id: o_microscopic
        text: Microscopische hematurie
        value: microscopic

steps:
  - id: s_hematuria_1
    title: Type hematurie
    questions: [hematuriaType]

results:
  blood.visibleHematuria:
    title: "Hematurie: Zichtbare hematurie"
    description: "Verdere diagnostiek noodzakelijk."
    explainer: "Plan een afspraak op het spreekuur in. Macroscopische hematurie die niet wordt verklaard door menstruatie, myoglobinurie na extreme inspanning, een urineweginfectie of nierstenen is een alarmsymptoom en verdient aanvullend onderzoek naar onderliggende oorzaak."
    documentation: "Afspraak op spreekuur ingepland."
    sources:
      - name: "NHG-Standaard Urineweginfecties: beleid"
        url: "https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-richtlijnen-beleid-bij-cystitis"
      - name: "H&W Microscopisch erytrocytenverlies in de urine"
        url: "https://www.henw.org/artikelen/microscopisch-erytrocytenverlies-de-urine"
      - name: "NVU richtlijn Hematurie"
        url: "https://www.nvu.nl/kwaliteitsbeleid/richtlijnen/actuele-richtlijnen/"
      - name: "NVKC richtlijn Eenduidige en accurate laboratoriumdiagnostiek bij hematurie"
        url: "https://www.nvkc.nl/kwaliteit/richtlijnen/normen-en-richtlijnen"

  blood.proteinuria:
    title: "Hematurie: Proteinurie"
    description: "Verdere diagnostiek noodzakelijk."
    explainer: "Urinescreening met urinestrip is veelal positief vanaf een eiwit(albumine)concentratie van ongeveer 100-300 mg/l. Een positieve urinestrip voor eiwit samen met hematurie rechtvaardigt dan ook een nefrologische analyse. Instrueer de patiënt dat een urinemonster zo snel mogelijk na verzamelen bij het laboratorium moet worden ingeleverd (liefst ter plaatse). Gebruik de tweede, midstraal, ochtendurine (een verzameling van twee tot vier uur na lozing van de eerste ochtendurine) voor onderzoek. Omdat dit monster geconcentreerd en zuur is, zijn de erytrocyten beter te behouden. Maar het langdurige overnachtverblijf in de blaas vergroot de kans op afbraak."
    documentation: "Bloedonderzoek op kreatinine/eGFR, nuchter glucose\nUrine: sediment (vraagstelling: Erytrocyten? Percentage dysmorfe erytrocyten, (inclusief acanthocyten) en (indien aanwezig) percentage acanthocyten ten opzichte van het totaal aantal erytrocyten? Aanwezigheid en aard van cilinders?) en mate van proteïnurie (albumine, kreatinine en ACR)\nBloeddrukmeting\nNa onderzoeken op korte termijn afspraak op spreekuur"
    sources:
      - name: "NHG-Standaard Urineweginfecties: beleid"
        url: "https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-richtlijnen-beleid-bij-cystitis"
      - name: "H&W Microscopisch erytrocytenverlies in de urine"
        url: "https://www.henw.org/artikelen/microscopisch-erytrocytenverlies-de-urine"
      - name: "NVU richtlijn Hematurie"
        url: "https://www.nvu.nl/kwaliteitsbeleid/richtlijnen/actuele-richtlijnen/"
      - name: "NVKC richtlijn Eenduidige en accurate laboratoriumdiagnostiek bij hematurie"
        url: "https://www.nvkc.nl/kwaliteit/richtlijnen/normen-en-richtlijnen"

  blood.microscopicHematuria:
    title: "Hematurie: Microscopische hematurie"
    description: "Verdere diagnostiek noodzakelijk."
    testAfterTreatment: "Over 1 week controle op bloed via een urineonderzoek. Instructies: enkele dagen vóór het onderzoek niet intensief te sporten, de urine niet te verzamelen tijdens een menstruatie en een schoon verzamelpotje te gebruiken. Bij nieuwe symptomen contact. Indien bij controle geen bloed in de urine geen verdere controle."
    explainer: "Het vinden van erytrocyten in de urine is niet altijd een teken van een onderliggend lijden (de sensitiviteit van de urinesticktest voor erytrocyten is 91,6%, de specificiteit is 56,9%. De lage specificiteit maakt dat een positieve urinesticktest geen garantie biedt op erytrocyten in de urine). Als de urinesticktest positief is bij een patiënt zonder klachten of met klachten zonder duidelijke oorzaak, luidt het advies om de test na 1 week te herhalen en dan nogmaals als de tweede test negatief is. Als 2 urinesticktests binnen enkele weken een positieve uitslag geven, mag men spreken van 'persisterend erytrocytenverlies in de urine'. Foutpositieve testuitslagen ontstaan door myoglobinurie, forse bacteriurie, oxiderende schoonmaakmiddelen bij het reinigen van verzamelpotjes en contaminatie met bijvoorbeeld menstruatiebloed of bloed uit rectum of colon. Foutnegatieve resultaten ontstaan door hoge concentraties eiwit (> 5 g/l), vitamine C of nitriet (> 2,5 mmol/l), en conserveermiddelen (formaline)."
    documentation: "Over 1 week controle op bloed via een urineonderzoek."
    sources:
      - name: "NHG-Standaard Urineweginfecties: beleid"
        url: "https://richtlijnen.nhg.org/standaarden/urineweginfecties#volledige-tekst-richtlijnen-beleid-bij-cystitis"
      - name: "H&W Microscopisch erytrocytenverlies in de urine"
        url: "https://www.henw.org/artikelen/microscopisch-erytrocytenverlies-de-urine"
      - name: "NVU richtlijn Hematurie"
        url: "https://www.nvu.nl/kwaliteitsbeleid/richtlijnen/actuele-richtlijnen/"
      - name: "NVKC richtlijn Eenduidige en accurate laboratoriumdiagnostiek bij hematurie"
        url: "https://www.nvkc.nl/kwaliteit/richtlijnen/normen-en-richtlijnen"

logic:
  - when: ["hematuriaType == visible"]
    show: blood.visibleHematuria
  - when: ["hematuriaType == proteinuria"]
    show: blood.proteinuria
  - when: ["hematuriaType == microscopic"]
    show: blood.microscopicHematuria
